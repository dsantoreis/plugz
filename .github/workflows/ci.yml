name: CI

on:
  push:
  pull_request:

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go mod tidy
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m
      - name: Unit + Integration + E2E
        run: go test ./...
      - name: Race detector
        run: go test -race ./...
      - name: Build
        run: go build ./...
      - name: Coverage gate (core >= 80%)
        run: |
          go test ./internal/orchestrator -coverprofile=coverage.out -covermode=atomic
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "Coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p >= 80 ? 0 : 1) }'
      - name: Coverage report artifact
        run: go tool cover -html=coverage.out -o coverage.html
      - uses: actions/upload-artifact@v4
        with:
          name: plugz-go-coverage
          path: |
            coverage.out
            coverage.html

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  docs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [go-ci, web-build, docs-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --pull -t plugz:ci .
