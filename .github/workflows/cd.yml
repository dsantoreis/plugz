name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - run: go build ./...
      - run: docker build -t ai-agent-skills-demo:ci .
